<div>
  <h2>Student Directory ({{ students.length }} students)</h2>
  <div style="margin-bottom: 15px;">
    <input type="text" placeholder="Search by name or email..." (input)="onSearch($event)" style="padding: 8px; width: 300px; box-sizing: border-box;" />
  </div>
  
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Grade</th>
        <th>Email</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (student of filteredStudents; track student.id) {
        <tr>
          <td>{{ student.id }}</td>
          <td>{{ student.firstName }}</td>
          <td>{{ student.lastName }}</td>
          <td>{{ student.grade }}</td>
          <td>{{ student.email }}</td>
          <td>
            <a [routerLink]="['/edit', student.id]" style="background-color: #007bff; color: white; border: none; padding: 5px 10px; cursor: pointer; text-decoration: none; margin-right: 5px; font-size: 13.3px; display: inline-block;">Edit</a>
            <button (click)="deleteStudent(student.id)">Delete</button>
          </td>
        </tr>
      } @empty {
        <tr>
          <td colspan="6">No students found.</td>
        </tr>
      }
    </tbody>
  </table>
</div>
